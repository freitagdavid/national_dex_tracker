schema: https://beta.pokeapi.co/graphql/v1beta
overwrite: true
documents: ./**/*.gql
generates:
  # services/types.generated.ts:
  #   plugins:
  #   - typescript
  ./graphql/:
    preset: client
    plugins:
    - typescript
    - typescript-resolvers
    - typescript-rtk-query
    config:
      importBaseApiFrom: ./services/pokemon.ts
      exportHooks: true
      importBaseApiAlternateName: 'pokemonApi'